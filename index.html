<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#236854">
  <meta name="application-name" content="Quiz Web Marketing">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Quiz Web Marketing">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <title>Quiz Web Marketing</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --panel: #ffffff;
      --panel-soft: #f1f4ef;
      --text: #1f261f;
      --muted: #667064;
      --line: #d8ded4;
      --line-strong: #bac6b9;
      --accent: #236854;
      --accent-soft: #e5efea;
      --good: #236854;
      --bad: #9f3f3d;
      --focus: #d8ad3f;
      --shadow: 0 22px 55px rgba(33, 45, 35, 0.08);
      --shadow-soft: 0 10px 26px rgba(33, 45, 35, 0.06);
      --radius: 8px;
      --font-ui: "Satoshi", "Geist", "Aptos", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-mono: "Geist Mono", "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      font-family: var(--font-ui);
    }

    * { box-sizing: border-box; }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 13% -8%, rgba(35, 104, 84, 0.12), transparent 34vw),
        linear-gradient(180deg, #eef3ed 0, var(--bg) 310px),
        var(--bg);
      color: var(--text);
      font-size: 16px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    button,
    select { font: inherit; }

    button {
      min-height: 42px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      touch-action: manipulation;
      transition: border-color 180ms ease, background 180ms ease, color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
    }

    button:hover {
      border-color: var(--line-strong);
      background: #fbfcfa;
    }

    button:active { transform: translateY(1px) scale(0.99); }

    button:focus-visible,
    select:focus-visible,
    input[type="checkbox"]:focus-visible {
      outline: 3px solid rgba(216, 173, 63, 0.42);
      outline-offset: 2px;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.primary:hover {
      background: #1d5b49;
      border-color: #1d5b49;
      box-shadow: 0 10px 24px rgba(35, 104, 84, 0.16);
    }

    button.ghost { background: rgba(255, 255, 255, 0.58); }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
      transform: none;
      box-shadow: none;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "title controls"
        "intro controls"
        "layout layout";
      column-gap: 28px;
      row-gap: 6px;
      align-items: end;
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 30px 22px 44px;
    }

    .topbar {
      grid-area: title;
      min-width: 0;
    }

    .topbar > *,
    .question-head > *,
    .layout > * {
      min-width: 0;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(31px, 4vw, 50px);
      line-height: 0.98;
      letter-spacing: -0.02em;
      font-weight: 820;
    }

    .subhead {
      grid-area: intro;
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.55;
      max-width: 760px;
      overflow-wrap: anywhere;
    }

    .toolbar {
      grid-area: controls;
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-self: end;
      gap: 10px;
    }

    .toolbar button {
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
    }

    .layout {
      grid-area: layout;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px;
      gap: 20px;
      align-items: start;
      margin-top: 18px;
    }

    .card,
    .side {
      min-width: 0;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .card { overflow: hidden; }

    .question-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 28px 30px 22px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(90deg, rgba(35, 104, 84, 0.055), transparent 44%),
        linear-gradient(180deg, #fff, #fbfcfa);
    }

    .section-label {
      display: block;
      margin: 0 0 8px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 760;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .question-count {
      color: var(--muted);
      font-size: 14px;
      font-family: var(--font-mono);
      white-space: nowrap;
    }

    .progress {
      height: 7px;
      background: #e2e8df;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 220ms ease;
    }

    .question-body { padding: 28px 30px; }

    .question-text {
      margin: 0;
      font-size: clamp(24px, 2.45vw, 32px);
      line-height: 1.18;
      letter-spacing: -0.015em;
      font-weight: 610;
      max-width: 920px;
      overflow-wrap: anywhere;
    }

    .answers {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .answer {
      display: grid;
      grid-template-columns: 40px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      max-width: 100%;
      min-width: 0;
      min-height: 62px;
      padding: 13px 15px;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: 0 1px 0 rgba(33, 45, 35, 0.03);
    }

    .answer:hover {
      border-color: var(--line-strong);
      background: #fbfcf9;
    }

    .answer .letter {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 800;
      font-family: var(--font-mono);
    }

    .answer > span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
      line-height: 1.32;
    }

    .answer.correct {
      border-color: rgba(35, 104, 84, 0.5);
      background: rgba(35, 104, 84, 0.075);
    }

    .answer.correct .letter {
      background: var(--good);
      color: #fff;
    }

    .answer.wrong {
      border-color: rgba(159, 63, 61, 0.42);
      background: rgba(159, 63, 61, 0.07);
    }

    .answer.wrong .letter {
      background: var(--bad);
      color: #fff;
    }

    .feedback {
      min-height: 28px;
      margin: 18px 0 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .feedback.good { color: var(--good); }
    .feedback.bad { color: var(--bad); }

    .card-actions {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 30px 22px;
      border-top: 1px solid var(--line);
      background: rgba(250, 251, 249, 0.94);
    }

    .card-actions > div {
      display: flex;
      gap: 10px;
    }

    .side {
      position: sticky;
      top: 20px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      margin: -1px -1px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--line);
    }

    .stat {
      min-height: 74px;
      padding: 13px;
      border: 0;
      border-radius: 0;
      background: rgba(250, 251, 249, 0.92);
    }

    .stat strong {
      display: block;
      font-family: var(--font-mono);
      font-size: 25px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .control {
      display: grid;
      gap: 7px;
      margin-top: 16px;
    }

    .control label,
    .mini-title {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 750;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--text);
      padding: 0 12px;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .toggles {
      display: grid;
      gap: 9px;
      margin: 18px 0 20px;
    }

    .toggle {
      display: flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .topic-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .topic-row {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.32;
    }

    .topic-meter {
      display: block;
      height: 5px;
      border-radius: 999px;
      background: #e3e8df;
      overflow: hidden;
    }

    .topic-meter span {
      display: block;
      height: 100%;
      width: 0%;
      background: var(--accent);
    }

    .review {
      display: none;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .review.visible { display: block; }

    .review-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .review-item,
    .empty {
      margin: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfa;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .review-item button {
      display: block;
      width: 100%;
      margin-top: 8px;
      min-height: 36px;
    }

    @media (max-width: 880px) {
      .shell,
      .layout { grid-template-columns: 1fr; }

      .shell {
        grid-template-areas:
          "title"
          "intro"
          "controls"
          "layout";
      }

      .toolbar { justify-content: flex-start; }
      .question-head { grid-template-columns: 1fr; }
      .question-count { white-space: normal; }
      .side {
        position: static;
      }
    }

    @media (max-width: 540px) {
      body {
        background:
          linear-gradient(180deg, rgba(35, 104, 84, 0.1), transparent 220px),
          var(--bg);
      }

      .shell {
        display: flex;
        flex-direction: column;
        padding: 18px 10px calc(110px + env(safe-area-inset-bottom));
      }

      .topbar {
        order: 1;
        gap: 16px;
        margin-bottom: 20px;
      }

      h1 {
        margin-bottom: 16px;
        font-size: 30px;
        line-height: 1;
      }

      .layout {
        order: 2;
        margin-top: 0;
      }

      .subhead {
        order: 3;
        margin-top: 18px;
        font-size: 15px;
        line-height: 1.45;
      }

      .toolbar {
        order: 4;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        width: 100%;
        margin-top: 14px;
      }

      .toolbar button {
        width: 100%;
      }

      .question-head {
        padding: 20px 18px 15px;
        border-radius: var(--radius) var(--radius) 0 0;
      }

      .question-body {
        padding: 20px 18px 18px;
      }

      .question-text {
        font-size: 23px;
        line-height: 1.18;
      }

      .answers {
        gap: 10px;
      }

      .card-actions {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2;
        display: grid;
        grid-template-columns: 0.85fr 1.35fr 1fr;
        gap: 8px;
        width: min(370px, calc(100vw - 20px));
        margin: 0 auto;
        padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
        border-radius: 0 0 var(--radius) var(--radius);
        background: rgba(250, 251, 249, 0.97);
        box-shadow: 0 -14px 28px rgba(29, 46, 34, 0.09);
      }

      .card {
        overflow: visible;
      }

      .card-actions > div,
      .card-actions button {
        width: 100%;
      }

      .card-actions > div {
        display: contents;
      }

      .card-actions button {
        padding: 0 8px;
        white-space: nowrap;
      }

      .answer {
        grid-template-columns: 34px 1fr;
        align-items: start;
        min-height: 62px;
        padding: 12px;
      }

      .answer .letter {
        margin-top: 1px;
      }

      .feedback {
        min-height: 0;
        margin-top: 14px;
      }

      .side {
        padding: 16px;
      }

      .stat {
        min-height: 70px;
      }

      .topic-row {
        font-size: 12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>Quiz Web Marketing</h1>
    </header>
    <p class="subhead">50 domande casuali da un banco di 500 quesiti costruito sugli appunti Granato, Michelini e sulla traccia d’esame precedente.</p>
    <div class="toolbar">
      <button id="restartBtn" type="button">Nuovo quiz</button>
      <button id="reviewModeBtn" type="button">Ripassa errori</button>
    </div>

    <section class="layout" aria-label="Quiz interattivo">
      <article class="card">
        <div class="question-head">
          <div>
            <p class="section-label" id="sectionLabel"></p>
            <p class="question-text" id="questionText"></p>
          </div>
          <div class="question-count" id="questionCount"></div>
        </div>
        <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
        <div class="question-body">
          <div class="answers" id="answers"></div>
          <p class="feedback" id="feedback" aria-live="polite"></p>
        </div>
        <div class="card-actions">
          <button id="prevBtn" type="button">Indietro</button>
          <div>
            <button id="revealBtn" type="button" class="ghost">Mostra risposta</button>
            <button id="nextBtn" type="button" class="primary">Avanti</button>
          </div>
        </div>
      </article>

      <aside class="side" aria-label="Controlli e risultati">
        <div class="stat-grid">
          <div class="stat"><strong id="scoreStat">0</strong><span>Corrette</span></div>
          <div class="stat"><strong id="percentStat">0%</strong><span>Precisione</span></div>
          <div class="stat"><strong id="doneStat">0</strong><span>Risposte</span></div>
          <div class="stat"><strong id="leftStat">50</strong><span>Da fare</span></div>
        </div>

        <div class="control">
          <label for="quizMode">Modalita quiz</label>
          <select id="quizMode"></select>
        </div>

        <div class="control">
          <label for="topicFilter">Argomento</label>
          <select id="topicFilter"></select>
        </div>

        <div class="toggles">
          <label class="toggle"><input id="shuffleToggle" type="checkbox" checked> Mescola domande</label>
          <label class="toggle"><input id="unansweredToggle" type="checkbox"> Mostra solo non risposte</label>
        </div>

        <p class="mini-title">Copertura argomenti</p>
        <div class="topic-list" id="topicList"></div>

        <div class="review" id="reviewPanel">
          <p class="mini-title">Errori da ripassare</p>
          <div class="review-list" id="reviewList"></div>
        </div>
      </aside>
    </section>
  </main>

  <script src="questions-data.js"></script>
  <script>
    if ("serviceWorker" in navigator && window.isSecureContext) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    const quizModes = window.WEB_MARKETING_SPECIAL_QUIZZES || [];
    const letters = ["A", "B", "C", "D"];
    const quizSize = 50;
    const storageKey = "web-marketing-quiz-v1";
    let questions = window.WEB_MARKETING_QUIZ_BANK || [];
    const questionById = new Map(questions.map(q => [q.id, q]));
    let state = loadState();
    let order = [];
    let optionOrder = {};
    let index = 0;
    let reviewOnly = false;

    const els = {
      sectionLabel: document.getElementById("sectionLabel"),
      questionText: document.getElementById("questionText"),
      questionCount: document.getElementById("questionCount"),
      answers: document.getElementById("answers"),
      feedback: document.getElementById("feedback"),
      progressBar: document.getElementById("progressBar"),
      scoreStat: document.getElementById("scoreStat"),
      percentStat: document.getElementById("percentStat"),
      doneStat: document.getElementById("doneStat"),
      leftStat: document.getElementById("leftStat"),
      quizMode: document.getElementById("quizMode"),
      topicFilter: document.getElementById("topicFilter"),
      topicList: document.getElementById("topicList"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      revealBtn: document.getElementById("revealBtn"),
      restartBtn: document.getElementById("restartBtn"),
      reviewModeBtn: document.getElementById("reviewModeBtn"),
      shuffleToggle: document.getElementById("shuffleToggle"),
      unansweredToggle: document.getElementById("unansweredToggle"),
      reviewPanel: document.getElementById("reviewPanel"),
      reviewList: document.getElementById("reviewList")
    };

    init();

    function init() {
      populateQuizModes();
      els.quizMode.value = state.mode || "all";
      ensureQuizSession();
      els.quizMode.value = state.mode || "all";
      updateTopicFilter();

      els.quizMode.addEventListener("change", () => {
        index = 0;
        reviewOnly = false;
        startNewQuiz();
      });

      els.topicFilter.addEventListener("change", () => {
        reviewOnly = false;
        index = 0;
        rebuildOrder();
        render();
      });

      els.shuffleToggle.addEventListener("change", () => {
        index = 0;
        rebuildOrder();
        render();
      });

      els.unansweredToggle.addEventListener("change", () => {
        reviewOnly = false;
        index = 0;
        rebuildOrder();
        render();
      });

      els.answers.addEventListener("click", event => {
        const button = event.target.closest("button[data-letter]");
        if (!button || !els.answers.contains(button)) return;
        choose(button.dataset.letter);
      });

      els.prevBtn.addEventListener("click", () => {
        index = Math.max(0, index - 1);
        render();
      });

      els.nextBtn.addEventListener("click", () => {
        index = Math.min(order.length - 1, index + 1);
        render();
      });

      els.revealBtn.addEventListener("click", () => {
        const q = currentQuestion();
        if (!q) return;
        state.answers[q.id] = state.answers[q.id] || { selected: null, revealed: true };
        state.answers[q.id].revealed = true;
        saveState();
        render();
      });

      els.restartBtn.addEventListener("click", startNewQuiz);

      els.reviewModeBtn.addEventListener("click", () => {
        reviewOnly = !reviewOnly;
        index = 0;
        rebuildOrder();
        render();
      });

      document.addEventListener("keydown", event => {
        if (event.target.matches("select, button, input")) return;
        if (["1", "2", "3", "4"].includes(event.key)) {
          const q = currentQuestion();
          const visibleLetter = q ? getOptionOrder(q.id)[Number(event.key) - 1] : null;
          if (visibleLetter) choose(visibleLetter);
        }
        if (event.key === "ArrowRight") els.nextBtn.click();
        if (event.key === "ArrowLeft") els.prevBtn.click();
      });

      rebuildOrder();
      render();
    }

    function ensureQuizSession() {
      const mode = getSelectedMode();
      const pool = getModePool(mode);
      const validIds = new Set(pool.map(q => q.id));
      const expectedSize = Math.min(quizSize, pool.length);
      const ids = Array.isArray(state.quizIds) ? state.quizIds : [];
      const validSession = state.mode === mode && ids.length === expectedSize && ids.every(id => validIds.has(id));
      if (!validSession) {
        state = { answers: {}, quizIds: pickQuizIds(), mode };
        saveState();
      }
    }

    function startNewQuiz() {
      const mode = getSelectedMode();
      state = { answers: {}, quizIds: pickQuizIds(), mode };
      optionOrder = {};
      order = [];
      index = 0;
      reviewOnly = false;
      els.topicFilter.value = "all";
      els.unansweredToggle.checked = false;
      els.shuffleToggle.checked = true;
      saveState();
      updateTopicFilter();
      rebuildOrder();
      render();
    }

    function populateQuizModes() {
      const modes = quizModes.length ? quizModes : [{ id: "all", label: "Generale bilanciato" }];
      els.quizMode.innerHTML = modes.map(mode => `<option value="${escapeHtml(mode.id)}">${escapeHtml(mode.label)}</option>`).join("");
    }

    function getSelectedMode() {
      return els.quizMode.value || "all";
    }

    function getModePool(modeId) {
      const mode = quizModes.find(item => item.id === modeId);
      if (!mode || mode.id === "all") return questions;
      return questions.filter(q => Array.isArray(q.tags) && q.tags.includes(mode.tag));
    }

    function pickQuizIds() {
      const pool = getModePool(getSelectedMode());
      return shuffle(pool.map(q => q.id)).slice(0, Math.min(quizSize, pool.length));
    }

    function getActiveQuestions() {
      return state.quizIds.map(id => questionById.get(id)).filter(Boolean);
    }

    function updateTopicFilter() {
      const current = els.topicFilter.value || "all";
      const sections = [...new Set(getActiveQuestions().map(q => q.section))];
      els.topicFilter.innerHTML = `<option value="all">Tutti gli argomenti</option>` +
        sections.map(section => `<option value="${escapeHtml(section)}">${escapeHtml(section)}</option>`).join("");
      els.topicFilter.value = current === "all" || sections.includes(current) ? current : "all";
    }

    function rebuildOrder() {
      const topic = els.topicFilter.value;
      const onlyUnanswered = els.unansweredToggle.checked;
      const wrongIds = new Set(getWrongQuestions().map(q => q.id));
      order = getActiveQuestions()
        .filter(q => topic === "all" || q.section === topic)
        .filter(q => !onlyUnanswered || !state.answers[q.id]?.selected)
        .filter(q => !reviewOnly || wrongIds.has(q.id))
        .map(q => q.id);
      if (els.shuffleToggle.checked) order = shuffle([...order]);
      if (index >= order.length) index = Math.max(0, order.length - 1);
    }

    function render() {
      renderStats();
      renderTopicList();
      renderReview();
      const q = currentQuestion();
      if (!q) {
        els.sectionLabel.textContent = "Nessuna domanda";
        els.questionText.textContent = "Non ci sono domande con i filtri attuali.";
        els.questionCount.textContent = "";
        els.answers.innerHTML = "";
        els.feedback.textContent = "Cambia filtro o disattiva il ripasso errori.";
        els.feedback.className = "feedback";
        els.progressBar.style.width = "0%";
        els.prevBtn.disabled = true;
        els.nextBtn.disabled = true;
        els.revealBtn.disabled = true;
        return;
      }

      const answerState = state.answers[q.id];
      const selected = answerState?.selected;
      const revealed = answerState?.revealed || Boolean(selected);
      els.questionText.textContent = q.text;
      els.sectionLabel.textContent = q.section;
      els.questionCount.textContent = `Domanda ${index + 1} di ${order.length}`;
      els.progressBar.style.width = `${((index + 1) / order.length) * 100}%`;
      els.prevBtn.disabled = index === 0;
      els.nextBtn.disabled = index === order.length - 1;
      els.revealBtn.disabled = Boolean(revealed);

      els.answers.innerHTML = getOptionOrder(q.id).map((letter, displayIndex) => {
        const classes = ["answer"];
        if (revealed && letter === q.answer) classes.push("correct");
        if (revealed && selected === letter && selected !== q.answer) classes.push("wrong");
        return `
          <button type="button" class="${classes.join(" ")}" data-letter="${letter}">
            <span class="letter">${displayIndex + 1}</span>
            <span>${escapeHtml(q.options[letter])}</span>
          </button>
        `;
      }).join("");

      if (!selected && !revealed) {
        els.feedback.textContent = "Scegli una risposta.";
        els.feedback.className = "feedback";
      } else if (selected === q.answer) {
        els.feedback.textContent = "Corretto.";
        els.feedback.className = "feedback good";
      } else if (revealed && !selected) {
        els.feedback.textContent = "Risposta corretta evidenziata.";
        els.feedback.className = "feedback";
      } else {
        els.feedback.textContent = "Non corretta. La risposta giusta è evidenziata.";
        els.feedback.className = "feedback bad";
      }
    }

    function choose(letter) {
      const q = currentQuestion();
      if (!q) return;
      state.answers[q.id] = { selected: letter, revealed: true };
      saveState();
      render();
    }

    function currentQuestion() {
      return questionById.get(order[index]);
    }

    function renderStats() {
      const activeQuestions = getActiveQuestions();
      const answered = activeQuestions.filter(q => state.answers[q.id]?.selected);
      const correct = answered.filter(q => state.answers[q.id].selected === q.answer);
      const percent = answered.length ? Math.round((correct.length / answered.length) * 100) : 0;
      els.scoreStat.textContent = correct.length;
      els.percentStat.textContent = `${percent}%`;
      els.doneStat.textContent = answered.length;
      els.leftStat.textContent = activeQuestions.length - answered.length;
    }

    function renderTopicList() {
      const activeQuestions = getActiveQuestions();
      const sections = [...new Set(activeQuestions.map(q => q.section))];
      els.topicList.innerHTML = sections.map(section => {
        const topicQuestions = activeQuestions.filter(q => q.section === section);
        const answered = topicQuestions.filter(q => state.answers[q.id]?.selected).length;
        const width = Math.round((answered / topicQuestions.length) * 100);
        return `
          <div class="topic-row">
            <span>${escapeHtml(section)} · ${answered}/${topicQuestions.length}</span>
            <span class="topic-meter"><span style="width:${width}%"></span></span>
          </div>
        `;
      }).join("");
    }

    function renderReview() {
      const wrong = getWrongQuestions();
      els.reviewPanel.classList.toggle("visible", wrong.length > 0 || reviewOnly);
      if (!wrong.length) {
        els.reviewList.innerHTML = `<p class="empty">Nessun errore registrato.</p>`;
        return;
      }

      els.reviewList.innerHTML = wrong.map(q => `
        <div class="review-item">
          ${escapeHtml(q.text)}
          <button type="button" data-jump="${q.id}">Vai alla domanda</button>
        </div>
      `).join("");

      els.reviewList.querySelectorAll("button").forEach(button => {
        button.addEventListener("click", () => {
          const id = Number(button.dataset.jump);
          const existing = order.indexOf(id);
          if (existing >= 0) {
            index = existing;
          } else {
            els.topicFilter.value = "all";
            els.unansweredToggle.checked = false;
            reviewOnly = false;
            rebuildOrder();
            index = order.indexOf(id);
          }
          render();
        });
      });
    }

    function getWrongQuestions() {
      return getActiveQuestions().filter(q => {
        const selected = state.answers[q.id]?.selected;
        return selected && selected !== q.answer;
      });
    }

    function loadState() {
      try {
        return JSON.parse(localStorage.getItem(storageKey)) || { answers: {} };
      } catch {
        return { answers: {} };
      }
    }

    function saveState() {
      localStorage.setItem(storageKey, JSON.stringify(state));
    }

    function getOptionOrder(questionId) {
      if (!optionOrder[questionId]) optionOrder[questionId] = shuffle([...letters]);
      return optionOrder[questionId];
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
